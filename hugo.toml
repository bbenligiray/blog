baseURL = 'https://blog.benligiray.com/'
languageCode = 'en-us'
title = 'blog.benligiray.com'
theme = 'ananke'

enableRobotsTXT = true

[markup.goldmark.renderer]
  unsafe= true

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[outputFormats.llms]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true
  notAlternative = true

[outputFormats.llmsfull]
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ["HTML", "RSS", "llms", "llmsfull"]

[params]
  env = "production"
  custom_css = ["custom.css"]
  body_classes = "palatino lh-copy bg-near-white"
  post_content_classes = "palatino lh-copy bg-near-white"
  recent_posts_number = 10
  favicon = "favicon.ico"

[[params.ananke_socials]]
